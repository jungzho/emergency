<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>root@red52:~# system_error</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #000; color: #ccc; padding: 20px; font-family: 'Courier New', Consolas, monospace; }
        .box { background: #000; padding: 35px 25px 25px; border: 2px solid #dc143c; text-align: left; max-width: 450px; width: 100%; box-sizing: border-box; position: relative; }
        .box::before { content: " root@red52:~# system_error "; position: absolute; top: -11px; left: 20px; background: #000; color: #dc143c; padding: 0 10px; font-size: 14px; font-weight: bold; }
        h1 { font-size: 18px; margin: 0 0 20px; color: #dc143c; text-transform: uppercase; font-weight: normal; }
        h1::after { content: " █"; animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        p { font-size: 14px; margin: 0 0 35px; line-height: 1.6; color: #aaa; word-break: keep-all; }
        b { color: #dc143c; font-weight: bold; }
        .btn { padding: 12px 16px; font-size: 14px; font-weight: bold; text-decoration: none; display: block; width: 100%; box-sizing: border-box; margin-bottom: 10px; cursor: pointer; }
        .btn::before { content: "# "; margin-right: 8px; font-weight: normal; }
        .milktank { background: transparent; color: #dc143c; border: 1px solid #dc143c; }
        .milktank:hover, .milktank:focus { background: #dc143c; color: #000; }
        .btn-retry { background: transparent; color: #777; border: 1px dashed #555; }
        .btn-retry:hover, .btn-retry:focus { background: #555; color: #000; border-style: solid; }
    </style>
</head>
<body>
    <div class="box">

        </p>
        <a href="https://milktank.kr" class="btn milktank">밀크탱크 접속</a>

</html>
