<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>root@red52:~# system_error</title>
    <style>
        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background: #050505; color: #ddd;
            padding: 20px;
        }
        .box {
            background: #000; padding: 25px 24px 30px; 
            border: 1px solid #333;
            box-shadow: 8px 8px 0px rgba(220, 20, 60, 0.15);
            text-align: left; max-width: 400px; width: 100%; box-sizing: border-box;
            position: relative;
        }
        .box::before {
            content: "root@red52:~# system_error";
            display: block;
            background: #222; color: #888;
            padding: 6px 10px; font-size: 13px;
            margin: -25px -24px 20px -24px;
            border-bottom: 1px solid #333;
        }
        .warning-icon { 
            font-size: 24px; margin-bottom: 5px; display: inline-block; 
        }
        h1 { 
            font-size: 20px; margin: 0 0 16px; color: #dc143c; 
            text-transform: uppercase;
        }
        h1::after {
            content: " _";
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }
        p { 
            font-size: 14px; margin: 0 0 30px; line-height: 1.7; color: #aaa; word-break: keep-all; 
        }
        b { 
            color: #fff; text-decoration: underline; text-decoration-color: #dc143c;
        }
        .btn {
            padding: 14px 16px; font-weight: bold; font-size: 15px;
            text-decoration: none; display: block; width: 100%; box-sizing: border-box;
            margin-bottom: 12px; transition: all 0.2s;
            font-family: inherit;
        }
        .btn::before {
            content: "> ./";
            opacity: 0.7;
            margin-right: 5px;
        }
        .milktank { 
            background: transparent; color: #dc143c; border: 1px solid #dc143c;
        }
        .milktank:hover { 
            background: #dc143c; color: #000;
        }
        .btn-retry { 
            background: transparent; color: #777; border: 1px solid #444; 
        }
        .btn-retry:hover { 
            background: #777; color: #000; border-color: #777;
        }
    </style>
</head>
<body>

    <div class="box">
        <span class="warning-icon">⚠️</span>
        <h1>접속 제한 중...</h1>
        <p>
            현재 외부 보안 시스템 장애로 인하여<br>사이트 접속이 원활하지 않습니다.<br><br>
            복구가 완료되면 즉시 공지하고<br>사이트 접속 제한을 해제하겠습니다.<br><br>
            정상 운영 중인 <b>밀크탱크(milktank.kr)</b>를<br>잠시 이용하시길 권장합니다.
        </p>
        
        <a href="https://milktank.kr" class="btn milktank">밀크탱크 접속</a>
        <a href="https://red52.kr" class="btn btn-retry">빨간오이 재시도</a>
    </div>

</body>
</html>
