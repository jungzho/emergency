<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>root@red52:~# system_error</title>
    
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">

    <style>
        body {
            margin: 0;
            padding: 50px 20px 20px;
            background: #000;
            color: #999;
            font-family: 'Courier New', Consolas, monospace;
        }
        .box {
            position: relative;
            max-width: 450px;
            margin: 0 auto;
            padding: 35px 25px 25px;
            border: 1px solid #222;
            box-sizing: border-box;
        }
        .box::before {
            content: " root@red52:~# system_error ";
            position: absolute;
            top: -10px;
            left: 20px;
            padding: 0 10px;
            background: #000;
            color: #333;
            font-size: 14px;
            font-weight: bold;
        }
        h1 {
            margin: 0 0 20px;
            color: #fff;
            font-size: 18px;
            font-weight: normal;
            text-transform: uppercase;
        }
        h1::after {
            content: " █";
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }
        p {
            margin: 0 0 35px;
            color: #999;
            font-size: 14px;
            line-height: 1.6;
            word-break: keep-all;
        }
        b { color: #fff; }
        .btn {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            padding: 12px 16px;
            box-sizing: border-box;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            overflow: hidden;
        }
        .btn-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .favicon {
            width: 16px;
            height: 16px;
            margin-right: 10px;
            display: block;
            flex-shrink: 0;
            object-fit: contain;
        }
        .milktank { color: #e31279; border: 1px solid #e31279; }
        .milktank:hover { background: #e31279; color: #000; }
        .btn-retry { color: #dc143c; border: 1px solid #dc143c; }
        .btn-retry:hover { background: #dc143c; color: #000; }
        .btn.offline {
            color: #333 !important;
            border: 1px solid #333 !important;
            background: transparent !important;
            cursor: not-allowed;
            pointer-events: none;
        }
        .btn.offline .favicon { filter: grayscale(100%) opacity(30%); }
    </style>
</head>
<body>
    <div class="box">
        <h1>[!] 접속 제한 중</h1>
        <p>
            Cloudflare 보안 시스템 장애로 인하여<br>사이트 접속이 원활하지 않습니다.<br><br>
            아래 버튼을 통해 서버 상태를 확인 후,<br>임시로 제휴 사이트를 이용하시길 바랍니다.
        </p>

        <a href="https://milktank.kr" id="btn-milktank" class="btn milktank offline" target="_blank">
            <span class="btn-text">milktank.kr (Checking...)</span>
        </a>
        <a href="https://red52.kr/autologin.php?mode=pass" id="btn-red52" class="btn btn-retry offline" target="_blank">
            <span class="btn-text">red52.kr (Checking...)</span>
        </a>
    </div>

    <script>
        async function checkSiteStatusExt(buttonId, healthUrl, faviconUrl, normalText, unstableText, offlineText, checkCount = 1) {
            const btn = document.getElementById(buttonId);
            const btnText = btn.querySelector('.btn-text');

            const img = new Image();
            img.className = 'favicon';
            img.src = `${faviconUrl}?t=${Date.now()}`;
            img.onerror = () => img.style.visibility = 'hidden';
            btn.insertBefore(img, btnText);

            const randomDelay = Math.floor(Math.random() * 501) + 1000;
            const minWaitTime = new Promise(resolve => setTimeout(resolve, randomDelay));
            let successCount = 0;

            for (let i = 0; i < checkCount; i++) {
                try {
                    const response = await fetch(`${healthUrl}?t=${Date.now()}`, {
                        method: 'GET',
                        cache: 'no-store',
                        mode: 'cors'
                    });

                    if (response.ok && await response.text() === "ALIVE") {
                        successCount++;
                    }
                } catch (error) {}

                if (i < checkCount - 1) await new Promise(r => setTimeout(r, 200));
            }

            await minWaitTime;

            if (successCount === checkCount) {
                btnText.textContent = normalText;
                btn.classList.remove('offline');
            } else {
                btnText.textContent = successCount === 0 ? offlineText : unstableText;
                btn.classList.add('offline');
            }
        }

        checkSiteStatusExt(
            'btn-milktank',
            'https://milktank.kr/uptimerobot.php',
            'https://milktank.kr/favicon.ico',
            'milktank.kr (Normal)',
            'milktank.kr (Unstable)',
            'milktank.kr (Offline)',
            1
        );

        checkSiteStatusExt(
            'btn-red52',
            'https://red52.kr/uptimerobot.php',
            'https://red52.kr/favicon.ico',
            'red52.kr (Normal)',
            'red52.kr (Unstable)',
            'red52.kr (Offline)',
            3
        );
    </script>
</body>
</html>
