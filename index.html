<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>root@red52:~# system_error</title>
    <style>
        body {
            margin: 0;
            padding: 50px 20px 20px;
            background: #000;
            color: #ccc;
            font-family: 'Courier New', Consolas, monospace;
        }

        .box {
            position: relative;
            max-width: 450px;
            margin: 0 auto;
            padding: 35px 25px 25px;
            border: 2px solid #dc143c;
            box-sizing: border-box;
        }

        .box::before {
            content: " root@red52:~# system_error ";
            position: absolute;
            top: -11px;
            left: 20px;
            padding: 0 10px;
            background: #000;
            color: #dc143c;
            font-size: 14px;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 20px;
            color: #dc143c;
            font-size: 18px;
            font-weight: normal;
            text-transform: uppercase;
        }

        h1::after {
            content: " █";
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        p {
            margin: 0 0 35px;
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            word-break: keep-all;
        }

        b { color: #dc143c; }

        .btn {
            display: flex; /* 파비콘 정렬을 위해 flex로 변경 */
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            padding: 12px 16px;
            box-sizing: border-box;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn::before {
            content: "# ";
            margin-right: 8px;
            font-weight: normal;
        }

        /* 파비콘 스타일 */
        .favicon {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            display: inline-block;
        }

        /* 기본/정상 상태 */
        .milktank {
            color: #dc143c;
            border: 1px solid #dc143c;
        }

        .milktank:hover {
            background: #dc143c;
            color: #000;
        }

        .btn-retry {
            color: #777;
            border: 1px dashed #555;
        }

        .btn-retry:hover {
            background: #555;
            color: #000;
            border-style: solid;
        }

        /* 접속 불가(오프라인) 상태 스타일 */
        .btn.offline {
            color: #444 !important;
            border: 1px solid #222 !important;
            background: transparent !important;
            cursor: not-allowed;
            pointer-events: none; /* 클릭 방지 */
        }
        .btn.offline .favicon {
            filter: grayscale(100%) opacity(30%); /* 파비콘 흑백 처리 */
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>[!] 접속 제한 중</h1>
        <p>
            외부 보안 시스템 장애로 인하여<br>사이트 접속이 원활하지 않습니다.<br><br>
            제휴 사이트 <b>밀크탱크(milktank.kr)</b>를<br>잠시 이용하시길 권장합니다.
        </p>
        
        <a href="https://milktank.kr" id="btn-milktank" class="btn milktank">
            <span class="btn-text">밀크탱크 접속 (확인 중...)</span>
        </a>
        <a href="https://red52.kr/autologin.php?mode=pass" id="btn-red52" class="btn btn-retry">
            <span class="btn-text">빨간오이 재시도 (확인 중...)</span>
        </a>
    </div>

    <script>
        async function checkSiteStatusExt(buttonId, healthUrl, successText, failText) {
    const btn = document.getElementById(buttonId);
    const btnText = btn.querySelector('.btn-text');

    try {
        // 캐시 무효화를 위해 타임스탬프 추가
        const response = await fetch(`${healthUrl}?t=${new Date().getTime()}`, {
            method: 'GET',
            cache: 'no-store', // 브라우저 캐시 완전 무시
            mode: 'cors'       // CORS 모드로 요청
        });

        // HTTP 상태 코드가 200번대인지 확인
        if (response.ok) {
            // PHP가 텍스트를 뱉으므로 json() 대신 text() 사용
            const text = await response.text(); 
            
            // 반환된 텍스트가 정확히 "ALIVE"인지 검증
            if (text === "ALIVE") {
                // 정상 작동 처리
                btnText.textContent = successText;
                btn.classList.remove('offline');
                return;
            }
        }
        throw new Error('Server is not ALIVE');

    } catch (error) {
        // 네트워크 오류, 서버 다운, CORS 거부 등 모든 에러 상황
        btnText.textContent = failText;
        btn.classList.add('offline');
    }
}

// 업로드하신 스크립트 경로에 맞게 함수 호출
checkSiteStatusExt('btn-milktank', 'https://milktank.kr/uptimerobot.php', '밀크탱크 접속 (원활)', '밀크탱크 접속 (불가)');
checkSiteStatusExt('btn-red52', 'https://red52.kr/uptimerobot.php', '빨간오이 재시도 (원활)', '빨간오이 재시도 (불가)');
    </script>
</body>
</html>
