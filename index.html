<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>root@red52:~# system_error</title>
    <style>
        body {
            margin: 0;
            padding: 50px 20px 20px;
            background: #000;
            color: #ccc;
            font-family: 'Courier New', Consolas, monospace;
        }

        .box {
            position: relative;
            max-width: 450px;
            margin: 0 auto;
            padding: 35px 25px 25px;
            border: 2px solid #dc143c;
            box-sizing: border-box;
        }

        .box::before {
            content: " root@red52:~# system_error ";
            position: absolute;
            top: -11px;
            left: 20px;
            padding: 0 10px;
            background: #000;
            color: #dc143c;
            font-size: 14px;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 20px;
            color: #dc143c;
            font-size: 18px;
            font-weight: normal;
            text-transform: uppercase;
        }

        h1::after {
            content: " █";
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        p {
            margin: 0 0 35px;
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            word-break: keep-all;
        }

        b { color: #dc143c; }

        .btn {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            padding: 12px 16px;
            box-sizing: border-box;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        /* 파비콘 고정 영역 (로딩 실패해도 공간 유지) */
        .favicon {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            display: block;
            flex-shrink: 0;
            object-fit: contain;
        }

        /* 기본/정상 상태 */
        .milktank {
            color: #dc143c;
            border: 1px solid #dc143c;
        }

        .milktank:hover {
            background: #dc143c;
            color: #000;
        }

        .btn-retry {
            color: #777;
            border: 1px dashed #555;
        }

        .btn-retry:hover {
            background: #555;
            color: #000;
            border-style: solid;
        }

        /* 접속 불가(오프라인) 상태 스타일 */
        .btn.offline {
            color: #444 !important;
            border: 1px solid #222 !important;
            background: transparent !important;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        .btn.offline .favicon {
            filter: grayscale(100%) opacity(30%);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>[!] 접속 제한 중</h1>
        <p>
            외부 보안 시스템 장애로 인하여<br>사이트 접속이 원활하지 않습니다.<br><br>
            제휴 사이트 <b>밀크탱크(milktank.kr)</b>를<br>잠시 이용하시길 권장합니다.
        </p>
        
        <a href="https://milktank.kr" id="btn-milktank" class="btn milktank">
            <span class="btn-text">밀크탱크 접속 (확인 중...)</span>
        </a>
        <a href="https://red52.kr/autologin.php?mode=pass" id="btn-red52" class="btn btn-retry">
            <span class="btn-text">빨간오이 재시도 (확인 중...)</span>
        </a>
    </div>

    <script>
        async function checkSiteStatusExt(buttonId, healthUrl, faviconUrl, successText, failText) {
            const btn = document.getElementById(buttonId);
            const btnText = btn.querySelector('.btn-text');

            // 1. 파비콘 이미지 삽입 (영역 확보)
            const img = new Image();
            img.className = 'favicon';
            img.src = faviconUrl + '?t=' + Date.now(); // 캐시 무효화
            
            // 로딩 실패 시 엑스박스를 숨기고 투명한 공간(16x16)만 유지
            img.onerror = function() {
                this.style.visibility = 'hidden'; 
            };
            btn.insertBefore(img, btnText);

            // 2. 최소 지연 시간 설정 (1.5초 = 1500ms)
            // 서버 응답이 아무리 빨라도 유저에게 "확인 중..." 상태를 1.5초간 보여줌
            const minWaitTime = new Promise(resolve => setTimeout(resolve, 1500));

            // 3. 서버 상태 체크 (fetch)
            let isAlive = false;
            try {
                const response = await fetch(`${healthUrl}?t=${Date.now()}`, {
                    method: 'GET',
                    cache: 'no-store',
                    mode: 'cors'
                });

                if (response.ok) {
                    const text = await response.text();
                    if (text === "ALIVE") {
                        isAlive = true;
                    }
                }
            } catch (error) {
                isAlive = false; // 네트워크 오류, CORS, 502 에러 등
            }

            // 4. fetch 작업이 끝났어도 타이머가 끝날 때까지 대기
            await minWaitTime;

            // 5. 결과에 따른 UI 변경
            if (isAlive) {
                btnText.textContent = successText;
                btn.classList.remove('offline');
            } else {
                btnText.textContent = failText;
                btn.classList.add('offline');
            }
        }

        // 실행 (버튼ID, uptimerobot 경로, 파비콘 경로, 성공텍스트, 실패텍스트)
        checkSiteStatusExt(
            'btn-milktank', 
            'https://milktank.kr/uptimerobot.php', 
            'https://milktank.kr/favicon.ico', 
            '밀크탱크 접속 (원활)', 
            '밀크탱크 접속 (불가)'
        );
        
        checkSiteStatusExt(
            'btn-red52', 
            'https://red52.kr/uptimerobot.php', 
            'https://red52.kr/favicon.ico', 
            '빨간오이 재시도 (원활)', 
            '빨간오이 재시도 (불가)'
        );
    </script>
</body>
</html>
