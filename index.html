<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>root@red52:~# system_error</title>
    <style>
        body {
            margin: 0;
            padding: 50px 20px 20px;
            background: #000;
            color: #ccc;
            font-family: 'Courier New', Consolas, monospace;
        }

        .box {
            position: relative;
            max-width: 450px;
            margin: 0 auto;
            padding: 35px 25px 25px;
            border: 2px solid #dc143c;
            box-sizing: border-box;
        }

        .box::before {
            content: " root@red52:~# system_error ";
            position: absolute;
            top: -11px;
            left: 20px;
            padding: 0 10px;
            background: #000;
            color: #dc143c;
            font-size: 14px;
            font-weight: bold;
        }

        h1 {
            margin: 0 0 20px;
            color: #dc143c;
            font-size: 18px;
            font-weight: normal;
            text-transform: uppercase;
        }

        h1::after {
            content: " █";
            animation: blink 1s step-end infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        p {
            margin: 0 0 35px;
            color: #aaa;
            font-size: 14px;
            line-height: 1.6;
            word-break: keep-all;
        }

        b { color: #dc143c; }

        .btn {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            padding: 12px 16px;
            box-sizing: border-box;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn::before {
            content: "# ";
            margin-right: 8px;
            font-weight: normal;
        }

        .milktank {
            color: #dc143c;
            border: 1px solid #dc143c;
        }

        .milktank:hover {
            background: #dc143c;
            color: #000;
        }

        .btn-retry {
            color: #777;
            border: 1px dashed #555;
        }

        .btn-retry:hover {
            background: #555;
            color: #000;
            border-style: solid;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>[!] 접속 제한 중</h1>
        <p>
            외부 보안 시스템 장애로 인하여<br>사이트 접속이 원활하지 않습니다.<br><br>
            제휴 사이트 <b>밀크탱크(milktank.kr)</b>를<br>잠시 이용하시길 권장합니다.
        </p>
        <a href="https://milktank.kr" class="btn milktank">밀크탱크 접속</a>
        <a href="https://red52.kr/autologin.php?mode=pass" class="btn btn-retry">빨간오이 재시도</a>
    </div>
</body>
</html>
